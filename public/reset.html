<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password — SupportLocalSLC</title>
    <link href="/shared/output.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/js/all.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/shared/supabase-init.js"></script>
    <script defer src="/shared/include.js"></script>
    <!-- Google Analytics GA4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-K8G0S3F790"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag("js", new Date());
      gtag("config", "G-K8G0S3F790");
    </script>
</head>

<body class="bg-white font-sans text-slate-900">
    <header class="bg-white shadow-md sticky top-0 z-40">
        <div data-include="header"></div>
    </header>

    <main class="container mx-auto px-6 py-10">
        <section class="max-w-md mx-auto bg-white rounded-2xl shadow p-6 sm:p-8">
            <h1 class="text-2xl font-bold text-slate-900 mb-2">Set a new password</h1>
            <p class="text-sm text-slate-500 mb-6">Enter your new password below.</p>

            <div id="success-message" class="hidden mb-4 rounded-lg border border-green-200 bg-green-50 text-green-800 px-3 py-2 text-sm"></div>
            <div id="error-message" class="hidden mb-4 rounded-lg border border-red-200 bg-red-50 text-red-800 px-3 py-2 text-sm"></div>

            <form id="reset-form" class="space-y-4">
                <label class="block">
                    <span class="text-sm font-medium">New Password</span>
                    <div class="mt-1 relative">
                        <input id="new-password" type="password" autocomplete="new-password" minlength="8"
                            class="w-full rounded-lg border border-slate-300 p-2.5 pr-10 focus:outline-none focus:ring-2 focus:ring-blue-600"
                            required />
                        <button type="button" id="toggle-pass" class="absolute inset-y-0 right-0 px-3 text-slate-500" aria-label="Show password">
                            <i class="far fa-eye"></i>
                        </button>
                    </div>
                </label>
                <button type="submit"
                    class="w-full rounded-lg bg-blue-900 text-yellow-300 font-semibold py-2.5 hover:bg-blue-800">
                    Update Password
                </button>
            </form>

            <div id="done-state" class="hidden text-center py-4">
                <p class="text-green-700 font-semibold mb-4">✅ Password updated successfully!</p>
                <a href="/dashboard.html" class="text-blue-600 underline">Go to your dashboard →</a>
            </div>
        </section>
    </main>

    <footer class="bg-gray-800 text-gray-400">
        <div data-include="footer"></div>
    </footer>

    <script type="module">
        const sb = window.supabaseClient;
        const successBox = document.getElementById('success-message');
        const errorBox = document.getElementById('error-message');
        const showError = (m) => { errorBox.textContent = m; errorBox.classList.remove('hidden'); successBox.classList.add('hidden'); };

        // Toggle password visibility
        document.getElementById('toggle-pass').addEventListener('click', () => {
            const i = document.getElementById('new-password');
            i.type = i.type === 'password' ? 'text' : 'password';
        });

        // Supabase sends the user here with a token in the URL hash.
        // The SDK picks it up automatically via onAuthStateChange.
        let sessionReady = false;

        sb.auth.onAuthStateChange(async (event, session) => {
            if (event === 'PASSWORD_RECOVERY') {
                sessionReady = true;
            }
        });

        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('new-password').value;

            if (!sessionReady) {
                // Try anyway — the session may already be set from the URL token
                const { data: { session } } = await sb.auth.getSession();
                if (!session) {
                    showError('This reset link has expired or is invalid. Please request a new one.');
                    return;
                }
            }

            const { error } = await sb.auth.updateUser({ password });
            if (error) {
                showError(error.message);
                return;
            }

            document.getElementById('reset-form').classList.add('hidden');
            document.getElementById('done-state').classList.remove('hidden');
        });
    </script>
</body>

</html>
