<body class="bg-gray-100">

    <!-- Header / Navigation -->
    <header class="bg-white shadow-md sticky top-0 z-40">

    <main class="container mx-auto p-4 md:p-8">

            <h1 class="text-4xl font-bold text-gray-800">Sandy Directory</h1>
            <p class="text-lg text-gray-600 mt-2">Discover the best local businesses in Sandy.</p>
        </div>

        <div class="container mx-auto px-4">
        
            <div class="lg:hidden mb-4">
                <button id="mobile-filter-btn"
                    class="w-full flex items-center justify-center py-3 px-4 bg-blue-600 text-white font-bold rounded-lg shadow-md">

                    Filter Businesses
                </button>

            <div class="grid grid-cols-1 lg:grid-cols-4 lg:gap-8">
        
                <aside id="desktop-filter-panel"
                    class="hidden lg:block lg:col-span-1 bg-white p-6 rounded-lg shadow-md self-start">

                <div class="lg:col-span-3">
                    <div class="relative mb-6">
                        <input type="search" id="search-input" placeholder="Search by business name, category, or tag..."
                            class="w-full p-3 pl-10 border border-gray-300 rounded-lg">

                    </div>
                    <div id="active-chips" class="mb-4 hidden"></div>
                    
                    <div id="business-grid" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6">
        
                    <div id="business-grid" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6">

        <div id="mobile-filter-drawer" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50">

                <div class="flex items-center justify-between p-4 border-b">

    <footer class="bg-gray-800 text-gray-400">
        <div data-include="footer"></div>
    </footer>

    <script type="module">
        const supabaseClient = window.supabaseClient;
        let allBusinesses = [];
        let allCategories = [];
        let allTags = new Map();      // id → {name, group_id}
        let allTagGroups = new Map(); // id → {id, name, is_universal}
        let selectedParentId = null;
        let selectedChildIds = new Set();
        let categorySearchTerm = '';

        // --- MAIN ENTRY POINT ---
        document.addEventListener('DOMContentLoaded', async () => {
            const [businessesRes, categoriesRes, tagsRes, tagGroupsRes] = await Promise.all([
                supabaseClient.from('businesses').select(`
                    *,
                    profiles (membership_level),
                    offers(*),
                    business_categories(categories(id, name, parent_id)),
                    business_tags(tags(id, name))
                `).eq('territory', 'sandy').eq('approval_status', 'approved').eq('is_deleted', false),
                supabaseClient.from('categories').select('id, name, parent_id').order('name'),
                supabaseClient.from('tags').select('id, name, group_id').order('name'),
                supabaseClient.from('tag_groups').select('id, name, is_universal')
            ]);

            if (businessesRes.error || categoriesRes.error || tagsRes.error || tagGroupsRes.error) {
                console.error('Error fetching data:', businessesRes.error || categoriesRes.error || tagsRes.error || tagGroupsRes.error);
                document.getElementById('business-grid').innerHTML = '<p class="text-red-500 col-span-full text-center">Error loading data. Please try again.</p>';
                return;
            }

            allCategories = categoriesRes.data;
            allTagGroups = new Map(tagGroupsRes.data.map(g => [g.id, g]));
            tagsRes.data.forEach(tag => allTags.set(tag.id, { name: tag.name, group_id: tag.group_id }));
            allBusinesses = processBusinessData(businessesRes.data);

            // Sort once on load — stable across all subsequent filter renders
            const tierWeights = { pro: 3, essentials: 2, free: 1 };
            const normTier = (lvl) => (lvl || 'free').toString().trim().toLowerCase();
            allBusinesses.sort((a, b) => {
                const weightA = tierWeights[normTier(a.profiles?.membership_level)] || 0;
                const weightB = tierWeights[normTier(b.profiles?.membership_level)] || 0;
                if (weightA !== weightB) return weightB - weightA; // Pro > Essentials > Free
                return Math.random() - 0.5;                        // randomized within tier, once
            });

            renderFilterPanels();
            renderActiveChips();
            applyOffersParam();
            renderBusinessGrid();
            setupEventListeners();
        });

        // --- DATA PROCESSING ---
        function processBusinessData(businesses) {
            const allCategoriesMap = new Map(allCategories.map(c => [c.id, c]));
            return businesses.map(biz => {
                const categories = biz.business_categories.map(bc => bc.categories);
                const tags = biz.business_tags.map(bt => bt.tags);
                const now = new Date();
                const activeOffers = (biz.offers || []).filter(o =>
                    o.is_active !== false && (!o.expires_at || new Date(o.expires_at) > now)
                );
                const has_offers = activeOffers.length > 0;
                return { ...biz, categories, tags, has_offers };
            });
        }

        // --- CATEGORY FUNNEL ---
        // buildCategoryResultsHtml: the dynamic part (parent buttons + child list).
        // The input is NOT included here — it lives in the stable wrapper built once by
        // buildCategoryFunnelHtml, so it keeps DOM focus across keystrokes.
        function buildCategoryResultsHtml() {
            const term = categorySearchTerm.toLowerCase();
            const parents = allCategories.filter(c => c.parent_id === null);

            const visibleParents = term
                ? parents.filter(p =>
                    p.id === selectedParentId ||
                    p.name.toLowerCase().includes(term) ||
                    allCategories.some(c => c.parent_id === p.id && c.name.toLowerCase().includes(term))
                  )
                : parents;

            let parentsHtml = '<div class="grid grid-cols-2 gap-2 mb-3">';
            visibleParents.forEach(cat => {
                const isSelected = selectedParentId === cat.id;
                const btnClass = isSelected
                    ? 'parent-cat-btn w-full text-left p-2 border rounded-lg text-sm font-medium cursor-pointer bg-blue-600 text-white border-blue-600'
                    : 'parent-cat-btn w-full text-left p-2 border rounded-lg text-sm font-medium cursor-pointer bg-white text-gray-700 border-gray-200 hover:border-blue-400 hover:text-blue-600';
                parentsHtml += `<button type="button" class="${btnClass}" data-parent-id="${cat.id}">${cat.name}</button>`;
            });
            parentsHtml += '</div>';

            let subHtml = '';
            if (selectedParentId) {
                const parent = allCategories.find(c => c.id === selectedParentId);
                const children = allCategories.filter(c => c.parent_id === selectedParentId);
                if (parent && children.length > 0) {
                    subHtml = `<div class="mt-1 mb-1 text-xs font-semibold text-gray-500 uppercase tracking-wide">Narrow: ${parent.name}</div>
                    <div class="space-y-1 pl-1 mb-3">`;
                    children.forEach(child => {
                        const isChecked = selectedChildIds.has(child.id);
                        subHtml += `<label class="flex items-center gap-2 text-sm text-gray-700 cursor-pointer hover:text-blue-600">
                            <input type="checkbox" class="h-4 w-4 rounded border-gray-300 text-blue-600 focus:ring-blue-500 category-child-checkbox" value="${child.id}"${isChecked ? ' checked' : ''}>
                            <span>${child.name}</span>
                        </label>`;
                    });
                    subHtml += '</div>';
                }
            }

            return parentsHtml + subHtml;
        }

        // Static wrapper built once on initial render. The input has no value attribute
        // because categorySearchTerm starts empty and is never re-rendered.
        function buildCategoryFunnelHtml() {
            return `<div class="category-funnel-section">
                <h3 class="text-lg font-semibold border-b pb-2 mb-3">Category</h3>
                <input type="text"
                    class="category-search-input w-full px-3 py-2 text-sm border border-gray-200 rounded-lg mb-3 focus:outline-none focus:ring-2 focus:ring-blue-400"
                    placeholder="Type to filter categories...">
                <div class="category-results">${buildCategoryResultsHtml()}</div>
            </div>`;
        }

        // Only updates .category-results — the input element is never touched,
        // so it keeps DOM focus across keystrokes.
        function renderCategoryFunnel() {
            const resultsHtml = buildCategoryResultsHtml();
            ['filter-panel-container', 'mobile-filter-container'].forEach(id => {
                const container = document.getElementById(id);
                if (!container) return;
                const results = container.querySelector('.category-results');
                if (results) results.innerHTML = resultsHtml;
            });
        }

        // --- FILTER PANEL ---
        function renderFilterPanels() {
            const dealsHtml = `
                <label class="flex items-center text-gray-600 hover:text-black font-semibold cursor-pointer">
                    <input type="checkbox" id="filter-offers" class="h-4 w-4 rounded border-gray-300 text-blue-600 focus:ring-blue-500 filter-checkbox" data-filter-type="offer">
                    <span class="ml-2">Active Offers</span>
                </label>`;

            // One section per universal tag group — driven by DB, no hardcoded group names
            let universalTagSectionsHtml = '';
            allTagGroups.forEach(group => {
                if (!group.is_universal) return;
                const tagsInGroup = [...allTags.entries()].filter(([, t]) => t.group_id === group.id);
                if (tagsInGroup.length === 0) return;
                const checkboxesHtml = tagsInGroup.map(([id, t]) =>
                    `<label class="flex items-center gap-2 text-gray-600 hover:text-black cursor-pointer">
                        <input type="checkbox" class="h-4 w-4 rounded border-gray-300 text-blue-600 focus:ring-blue-500 filter-checkbox" data-filter-type="tag" value="${id}">
                        <span class="text-sm">${t.name}</span>
                    </label>`
                ).join('');
                universalTagSectionsHtml += `
                    <div>
                        <h3 class="text-lg font-semibold border-b pb-2 mb-3">${group.name}</h3>
                        <div class="space-y-1">${checkboxesHtml}</div>
                    </div>`;
            });

            const fullFilterHtml = `
                <div class="sticky top-0 z-10 bg-white pb-3 mb-3 border-b">
                    <button type="button" class="clear-filters-btn w-full inline-flex items-center justify-center gap-2 px-4 py-2 rounded-md bg-gray-100 hover:bg-gray-200 text-gray-800 font-medium shadow-sm">
                        <i class="fas fa-broom text-sm"></i>
                        Clear All Filters
                    </button>
                </div>

                ${buildCategoryFunnelHtml()}

                <div>
                    <h3 class="text-lg font-semibold border-b pb-2 mb-3">Deals</h3>
                    ${dealsHtml}
                </div>

                ${universalTagSectionsHtml}

                <div class="pt-2">
                    <button type="button" class="clear-filters-btn w-full inline-flex items-center justify-center gap-2 px-4 py-2 rounded-md bg-gray-100 hover:bg-gray-200 text-gray-800 font-medium shadow-sm">
                        <i class="fas fa-broom text-sm"></i>
                        Clear All Filters
                    </button>
                </div>`;

            document.getElementById('filter-panel-container').innerHTML = fullFilterHtml;
            document.getElementById('mobile-filter-container').innerHTML = fullFilterHtml;
        }

        function applyOffersParam() {
            const params = new URLSearchParams(location.search);
            const wantsOffers = params.get('offers') === '1' || params.get('filter') === 'offers';
            if (!wantsOffers) return;

            ['filter-panel-container', 'mobile-filter-container'].forEach(id => {
                const container = document.getElementById(id);
                const cb = container?.querySelector('#filter-offers');
                if (cb && !cb.checked) {
                    cb.checked = true;
                    cb.dispatchEvent(new Event('change', { bubbles: true }));
                }
            });
            const url = new URL(window.location.href);
            url.searchParams.delete('offers');
            url.searchParams.delete('filter');
            const q = url.searchParams.toString();
            history.replaceState({}, '', url.pathname + (q ? `?${q}` : '') + url.hash);
        }

        function renderActiveChips() {
            const chipHost = document.getElementById('active-chips');
            if (!chipHost) return;

            const isMobile = window.innerWidth < 1024;
            const panel = isMobile
                ? document.getElementById('mobile-filter-container')
                : document.getElementById('filter-panel-container');

            const chips = [];
            const searchInput = document.getElementById('search-input');
            const searchTerm = (searchInput?.value || '').trim();
            if (searchTerm) chips.push({ type: 'search', label: `Search: ${searchTerm}` });

            const offersOn = !!panel?.querySelector('#filter-offers')?.checked;
            if (offersOn) chips.push({ type: 'offer', label: 'Active Offers' });

            // Category chips from module state (not DOM)
            if (selectedParentId) {
                if (selectedChildIds.size > 0) {
                    allCategories.filter(c => selectedChildIds.has(c.id))
                        .forEach(c => chips.push({ type: 'child-cat', value: c.id, label: c.name }));
                } else {
                    const p = allCategories.find(c => c.id === selectedParentId);
                    if (p) chips.push({ type: 'parent-cat', value: selectedParentId, label: p.name });
                }
            }

            // Tag chips from DOM
            panel?.querySelectorAll('.filter-checkbox[data-filter-type="tag"]:checked')
                .forEach(cb => {
                    const label = cb.nextElementSibling?.textContent?.trim() || 'Tag';
                    chips.push({ type: 'tag', value: cb.value, label });
                });

            if (chips.length === 0) {
                chipHost.innerHTML = '';
                chipHost.classList.add('hidden');
                return;
            }

            chipHost.classList.remove('hidden');
            chipHost.innerHTML = `
                <div class="flex flex-wrap gap-2">
                    ${chips.map(c => `
                        <button type="button" class="tag-chip" data-chip-type="${c.type}" data-chip-value="${c.value || ''}">
                            ${c.label}<span aria-hidden="true">&nbsp;×</span>
                        </button>`).join('')}
                </div>`;

            chipHost.onclick = (e) => {
                const chip = e.target.closest('.tag-chip');
                if (!chip) return;
                const type = chip.dataset.chipType;
                const val = chip.dataset.chipValue;

                if (type === 'search') {
                    if (searchInput) searchInput.value = '';
                } else if (type === 'offer') {
                    ['filter-panel-container', 'mobile-filter-container'].forEach(id => {
                        const el = document.getElementById(id)?.querySelector('#filter-offers');
                        if (el) el.checked = false;
                    });
                } else if (type === 'parent-cat') {
                    selectedParentId = null;
                    selectedChildIds.clear();
                    renderCategoryFunnel();
                } else if (type === 'child-cat') {
                    selectedChildIds.delete(val);
                    renderCategoryFunnel();
                } else if (type === 'tag') {
                    ['filter-panel-container', 'mobile-filter-container'].forEach(id => {
                        const sel = `.filter-checkbox[data-filter-type="tag"][value="${val}"]`;
                        document.getElementById(id)?.querySelectorAll(sel).forEach(el => el.checked = false);
                    });
                }

                renderActiveChips();
                renderBusinessGrid();
            };
        }

        function renderBusinessGrid() {
            const grid = document.getElementById('business-grid');

            const isMobile = window.innerWidth < 1024;
            const activeFilterContainer = isMobile
                ? document.getElementById('mobile-filter-container')
                : document.getElementById('filter-panel-container');
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const wantsOffers = activeFilterContainer?.querySelector('#filter-offers')?.checked;
            const selectedTagIds = new Set(
                Array.from(activeFilterContainer?.querySelectorAll('.filter-checkbox[data-filter-type="tag"]:checked') || [])
                    .map(el => el.value)
            );

            // Category filter from module state
            const childIdSet = !selectedParentId ? null
                : selectedChildIds.size > 0 ? selectedChildIds
                : new Set(allCategories.filter(c => c.parent_id === selectedParentId).map(c => c.id));

            const filtered = allBusinesses.filter(biz => {
                const searchCorpus = [biz.name || '', biz.tagline || '', ...biz.categories.map(c => c.name || ''), ...biz.tags.map(t => t.name || '')].join(' ').toLowerCase();
                const matchesSearch = !searchTerm || searchCorpus.includes(searchTerm);
                const matchesOffers = !wantsOffers || biz.has_offers;
                const matchesCategory = !childIdSet || biz.categories.some(cat => childIdSet.has(cat.id));
                const matchesTag = selectedTagIds.size === 0 || biz.tags.some(tag => selectedTagIds.has(String(tag.id)));
                return matchesSearch && matchesOffers && matchesCategory && matchesTag;
            });

            if (filtered.length === 0) {
                grid.innerHTML = '<p class="text-gray-500 col-span-full text-center">No businesses found matching your criteria.</p>';
                return;
            }

            grid.innerHTML = filtered.map(biz => {
                const level = (biz.profiles?.membership_level || 'free').toString().trim().toLowerCase();

                const sponsoredLabel = (level === 'pro' || level === 'essentials')
                    ? `<p class="text-xs font-semibold text-blue-800 uppercase tracking-wide">Sponsored Listing</p>`
                    : '';

                const allBizTags = biz.tags || [];
                const tagsToShow = allBizTags.slice(0, 3);
                const remainingTagsCount = allBizTags.length - tagsToShow.length;
                const tagsHtml = tagsToShow.map(t => `<span class="inline-block bg-gray-200 text-gray-700 text-xs font-medium px-2.5 py-1 rounded-full">${t.name}</span>`).join('');
                const moreTagsHtml = remainingTagsCount > 0
                    ? `<span class="inline-block bg-gray-100 text-gray-600 text-xs font-medium px-2.5 py-1 rounded-full">+${remainingTagsCount} more</span>`
                    : '';

                const offerRingClass = biz.has_offers ? 'ring-2 ring-offset-2 ring-yellow-400' : 'border-gray-200';
                const offerIndicator = biz.has_offers ? '<div class="absolute top-2 right-2 bg-yellow-400 text-yellow-900 text-xs font-bold px-2 py-1 rounded-full z-10">OFFER</div>' : '';

                return `
                    <a href="business.html?id=${biz.id}" class="relative flex flex-col bg-white rounded-lg shadow-md overflow-hidden group border hover:shadow-xl hover:border-blue-500 transition-all duration-300 ${offerRingClass}">
                        ${offerIndicator}
                        <div class="h-40 bg-gray-50 flex items-center justify-center overflow-hidden">
                            <img src="${biz.logo_url || 'https://placehold.co/400x300/EEE/31343C?text=Logo'}" alt="${biz.name} Logo" class="w-full h-full object-contain p-2 group-hover:scale-105 transition-transform duration-300">
                        </div>
                        <div class="p-4 flex flex-col flex-grow">
                            <h3 class="font-bold text-lg truncate text-gray-800">${biz.name}</h3>
                            ${sponsoredLabel}
                            <p class="text-sm text-gray-600 truncate mt-1 flex-grow">${biz.tagline || 'Local Sandy Business'}</p>
                            <div class="mt-3 pt-3 border-t border-gray-100">
                                <div class="flex flex-wrap items-center gap-2">
                                    ${tagsHtml}
                                    ${moreTagsHtml}
                                </div>
                            </div>
                        </div>
                    </a>`;
            }).join('');
        }

        // --- EVENT LISTENERS ---
        function setupEventListeners() {
            const drawer = document.getElementById('mobile-filter-drawer');
            document.getElementById('mobile-filter-btn').addEventListener('click', () => drawer.classList.remove('hidden'));
            document.getElementById('close-drawer-btn').addEventListener('click', () => drawer.classList.add('hidden'));
            document.getElementById('apply-filters-btn').addEventListener('click', () => {
                renderBusinessGrid();
                renderActiveChips();
                drawer.classList.add('hidden');
            });

            document.getElementById('search-input').addEventListener('input', () => {
                renderBusinessGrid();
                renderActiveChips();
            });

            document.getElementById('filter-panel-container').addEventListener('click', handleFilterChange);
            document.getElementById('mobile-filter-container').addEventListener('click', handleFilterChange);

            // Delegated input listeners for category type-to-filter (survive funnel re-renders)
            ['filter-panel-container', 'mobile-filter-container'].forEach(id => {
                document.getElementById(id)?.addEventListener('input', e => {
                    if (e.target.matches('.category-search-input')) {
                        categorySearchTerm = e.target.value;
                        renderCategoryFunnel();
                    }
                });
            });

            window.addEventListener('resize', renderActiveChips);
        }

        function handleFilterChange(event) {
            const target = event.target;

            // Clear buttons (top or bottom)
            if (target.closest && target.closest('.clear-filters-btn')) {
                selectedParentId = null;
                selectedChildIds.clear();
                categorySearchTerm = '';
                document.querySelectorAll('.filter-checkbox').forEach(cb => (cb.checked = false));
                const search = document.getElementById('search-input');
                if (search) search.value = '';
                const url = new URL(window.location.href);
                url.search = '';
                history.replaceState({}, '', url.pathname + url.hash);
                renderCategoryFunnel();
                renderBusinessGrid();
                renderActiveChips();
                document.getElementById('mobile-filter-drawer')?.classList?.add('hidden');
                return;
            }

            // Parent category button
            if (target.closest && target.closest('.parent-cat-btn')) {
                const parentId = target.closest('.parent-cat-btn').dataset.parentId;
                selectedParentId = (selectedParentId === parentId) ? null : parentId;
                selectedChildIds.clear();
                renderCategoryFunnel();
                if (window.innerWidth >= 1024) { renderBusinessGrid(); renderActiveChips(); }
                return;
            }

            // Child category checkbox
            if (target.matches && target.matches('.category-child-checkbox')) {
                target.checked ? selectedChildIds.add(target.value) : selectedChildIds.delete(target.value);
                if (window.innerWidth >= 1024) { renderBusinessGrid(); renderActiveChips(); }
                return;
            }

            // Tag/offer checkboxes — desktop auto-applies
            if (window.innerWidth >= 1024) {
                renderBusinessGrid();
                renderActiveChips();
            }
        }
    </script>
</body>

</html>
